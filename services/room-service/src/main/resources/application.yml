server:
  port: 8086

spring:
  application:
    name: room-service
  data:
    mongodb:
      uri: mongodb://${MONGO_USER}:${MONGO_PASS}@${DB_HOST}:${MONGO_PORT}/room_db?authSource=admin
      auto-index-creation: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.voicemessenger.mywire.org/realms/voice-messenger
          jwk-set-uri: http://keycloak:9090/realms/voice-messenger/protocol/openid-connect/certs

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always