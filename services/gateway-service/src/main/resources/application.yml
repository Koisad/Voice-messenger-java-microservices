server:
  port: 8080
spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-route
          uri: ${AUTH_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: chat-route
          uri: ${CHAT_URI:http://localhost:8082}
          predicates:
            - Path=/api/chat/**
        - id: signaling-route
          uri: ${SIGNALING_URI:ws://localhost:8083}
          predicates:
            - Path=/ws/**
        - id: ai-route
          uri: ${AI_URI:http://localhost:8084}
          predicates:
            - Path=/api/ai/**
        - id: analytics-route
          uri: ${ANALYTICS_URI:http://localhost:8085}
          predicates:
            - Path=/api/analytics/**
        - id: media-api-route
          uri: ${MEDIA_URI:http://localhost:8888}
          predicates:
            - Path=/api/media/**